<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 821" width="1200" height="821">
  <defs>
    <clipPath id="winClip">
      <rect x="0" y="0" width="1200" height="821" rx="16" ry="16"/>
    </clipPath>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="115%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="28"/>
      <feOffset dx="0" dy="18"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <g clip-path="url(#winClip)">
      <!-- top pad (macOS hidden-inset traffic-light area), matches the tab bar
           background so the pad and the tab bar blend into one surface -->
      <rect x="0" y="0" width="1200" height="48" fill="#171d26"/>
      <!-- app content (screenshot, shifted below the pad) -->
      <image xlink:href="file:///Users/johnny/.paseo/worktrees/3sseak0b/ideal-bulldog/docs/assets/screenshot.png"
             href="file:///Users/johnny/.paseo/worktrees/3sseak0b/ideal-bulldog/docs/assets/screenshot.png"
             x="0" y="48" width="1200" height="773"
             preserveAspectRatio="xMidYMid slice"/>
    </g>
  </g>

  <!-- macOS hidden-inset traffic lights (overlay the pad, clear of app content) -->
  <circle cx="22" cy="24" r="5.5" fill="#FF5F57"/>
  <circle cx="38" cy="24" r="5.5" fill="#FEBC2E"/>
  <circle cx="54" cy="24" r="5.5" fill="#28C840"/>
</svg>